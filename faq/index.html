    <!-- Structured data: the questions and answers on this page.
         Keep in step with FAQ.items in src/content.js. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do you paint live, or from photographs?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Both. The base package has me at your wedding painting live through the reception, and we add to it from there. If you would rather a studio commission from your own photos, before or after the day, I do those too, priced on enquiry."
            }
          },
          {
            "@type": "Question",
            "name": "How far ahead should we book?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Right now I am booking up to about two months out, so send me your date and I will tell you what is open. Earlier is always welcome, since I only take a limited number of weddings."
            }
          },
          {
            "@type": "Question",
            "name": "How do we secure our date?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A 50% retainer holds your date, with the balance due two weeks before your big day. I only confirm once the retainer is in, and then the date is yours."
            }
          },
          {
            "@type": "Question",
            "name": "What if we need to postpone or cancel?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Weddings move, and I get that. If you need to cancel or postpone, just let me know as early as you can. I try to be fair and reasonable, and the details depend on timing and whether I am able to rebook the date. Full terms sit in your booking agreement."
            }
          },
          {
            "@type": "Question",
            "name": "How long do you paint on the day?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Three hours in the base package, up to about five if you add hours, usually across the reception with short breaks. I pace myself instead of painting flat out, so the last piece gets the same care as the first."
            }
          },
          {
            "@type": "Question",
            "name": "Do you travel?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Travel is included for venues within about an hour of Melbourne or Sydney metro. Further out, including regional Victoria, regional NSW, and destination weddings, I am happy to discuss it and quote travel on enquiry. Just tell me your venue."
            }
          },
          {
            "@type": "Question",
            "name": "When do we receive the finished work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Guest portraits are done on the night and go home with your guests. Your couple portrait is painted that night too and left with you. Studio commissions from photos usually arrive within four weeks."
            }
          },
          {
            "@type": "Question",
            "name": "How many guests can you paint?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Around 8 pieces an hour, so a three-hour booking covers roughly 24 portraits. I usually paint two guests to a piece and can fit up to four, so how far that goes depends on how your guests pair up, not the size of your list. The number of pieces you book is the number I paint. If you want more covered, add live hours, or add the after-event service and I paint extra pieces in the studio and post them to you to pass on."
            }
          },
          {
            "@type": "Question",
            "name": "Do you frame the work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "I do not frame the work. It comes to you on cotton paper, sleeved and ready for a frame."
            }
          },
          {
            "@type": "Question",
            "name": "How should we send photos for a commission?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The clearer the photos, the better the portrait. Send a few well-lit, high-resolution shots where your faces are clear, and tell me which one feels most like you. I will take it from there."
            }
          },
          {
            "@type": "Question",
            "name": "What materials do you use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Professional watercolours on archival 300gsm A5 cotton paper. The pigments are lightfast, so the colour holds for decades if you look after it."
            }
          },
          {
            "@type": "Question",
            "name": "What do you need from us on the day?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Not much. A table around 100 by 60cm at seated height with room for a front-facing chair underneath, a chair, and a bit of space to stand for a short break each hour. I bring everything else. A drink or a bite is always welcome but never expected."
            }
          },
          {
            "@type": "Question",
            "name": "Do you paint events other than weddings?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. As well as weddings I do brand activations, corporate events and private parties across Melbourne and Australia-wide. It bends to fit the room, so tell me what you have in mind."
            }
          }
        ]
      }
    </script>

    <!-- The #root fallback below is kept in the HTML for crawlers and no-JS
         visitors, but hiding it at first paint stops it flashing as raw serif

         it back when JavaScript is unavailable, so it still works as a
         readable fallback page. -->

    </style>
    <noscript>
      <style>
        #ssr-fallback { display: block; }
      </style>
    </noscript>
